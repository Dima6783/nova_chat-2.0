<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nova Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#080c18; --bg1:#0e1428; --bg2:#141830; --bg3:#1a1f38; --bgh:#1e2440;
  --ac:#6c63ff; --ac2:#8b85ff; --glow:rgba(108,99,255,.3);
  --teal:#00d4aa; --teal2:rgba(0,212,170,.15);
  --t1:#e8eaf6; --t2:#8891b4; --t3:#4a5280;
  --bdr:rgba(108,99,255,.12); --bdrh:rgba(108,99,255,.3);
  --red:#ff4f6a; --yellow:#ffd060;
  --sw:310px; --r:16px; --sh:0 8px 40px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg0);color:var(--t1);height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}

/* ── Shell ── */
.app{display:flex;height:100dvh;position:relative}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:10;transition:transform .3s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── Sidebar header ── */
.s-head{padding:16px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;flex:1}
.logo-icon{width:34px;height:34px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 18px var(--glow)}
.logo-txt{font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--ac2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.av-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:2px solid var(--bdrh);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:border-color .2s;position:relative}
.av-btn:hover{border-color:var(--ac)}
.online-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;background:var(--teal);border-radius:50%;border:2px solid var(--bg1)}

/* ── Search ── */
.s-search{padding:10px 14px;flex-shrink:0}
.search-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:7px;padding:8px 12px;transition:border-color .2s,box-shadow .2s}
.search-box:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}
.search-box input{background:none;border:none;outline:none;color:var(--t1);font-family:'Sora',sans-serif;font-size:13px;width:100%}
.search-box input::placeholder{color:var(--t3)}

/* ── Nav tabs ── */
.nav-tabs{display:flex;gap:4px;padding:0 14px 10px;flex-shrink:0}
.nav-tab{flex:1;padding:6px 0;text-align:center;font-size:11.5px;font-weight:500;color:var(--t3);cursor:pointer;border-radius:7px;transition:all .2s}
.nav-tab.active{background:var(--glow);color:var(--ac2)}
.nav-tab:hover:not(.active){color:var(--t2);background:var(--bgh)}

/* ── Chat list ── */
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-item{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:12px;cursor:pointer;transition:background .15s;position:relative}
.chat-item:hover{background:var(--bgh)}
.chat-item.active{background:var(--bg3)}
.chat-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--ac);border-radius:0 3px 3px 0}
.ci-av{position:relative;flex-shrink:0}
.ci-img{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600}
.ci-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg1)}
.ci-dot.online{background:var(--teal)}.ci-dot.away{background:var(--yellow)}.ci-dot.offline{background:var(--t3)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ci-prev{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:10.5px;color:var(--t3)}
.ci-badge{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:17px;text-align:center}

/* ── Chat header ── */
.chat-header{padding:12px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;background:rgba(14,20,40,.85);backdrop-filter:blur(20px);flex-shrink:0;z-index:2}
.menu-btn{display:none;width:34px;height:34px;border:none;background:var(--bg3);border-radius:9px;cursor:pointer;color:var(--t2);align-items:center;justify-content:center}
.h-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-name{font-size:14.5px;font-weight:600}
.h-status{font-size:11.5px;color:var(--teal);margin-top:1px}
.h-status.off{color:var(--t3)}
.h-actions{display:flex;gap:6px}
.act-btn{width:36px;height:36px;border:none;background:var(--bg3);border-radius:10px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .2s;border:1px solid var(--bdr)}
.act-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 0 14px var(--glow)}
.act-btn.green:hover{background:var(--teal);border-color:var(--teal);box-shadow:0 0 14px rgba(0,212,170,.35)}

/* ── Messages ── */
.msgs-area{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:5px;position:relative}
.msg-date-sep{text-align:center;margin:8px 0;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:8px}
.msg-date-sep::before,.msg-date-sep::after{content:'';flex:1;height:1px;background:var(--bdr)}
.msg-wrap{display:flex;align-items:flex-end;gap:7px;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.out{flex-direction:row-reverse}
.msg-sm-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-bottom:2px}
.msg-wrap.out .msg-sm-av{display:none}
.msg-bubble{max-width:66%;padding:9px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;word-break:break-word;position:relative}
.msg-bubble.in{background:var(--bg3);border:1px solid var(--bdr);border-bottom-left-radius:5px;color:var(--t1)}
.msg-bubble.out{background:linear-gradient(135deg,#5b52e8,#7c6ff5);border-bottom-right-radius:5px;color:#fff;box-shadow:0 4px 18px var(--glow)}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:5px;font-size:10px;opacity:.6}
.msg-bubble.in .msg-meta{justify-content:flex-start}
.chk.seen{color:var(--teal);opacity:1}

/* Media in messages */
.msg-img{max-width:100%;max-height:280px;border-radius:10px;cursor:pointer;display:block;margin-bottom:5px;object-fit:cover}
.msg-video{max-width:100%;max-height:280px;border-radius:10px;display:block;margin-bottom:5px}
.msg-voice{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);padding:8px 12px;border-radius:10px;cursor:pointer;margin-bottom:5px}
.voice-icon{font-size:18px}
.voice-dur{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t2)}
.msg-file{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);padding:8px 12px;border-radius:10px;margin-bottom:5px;text-decoration:none;color:inherit}
.file-icon{font-size:18px}
.file-name{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}

/* Typing */
.typing-ind{display:none;align-items:flex-end;gap:7px;padding:0 20px 4px}
.typing-ind.vis{display:flex}
.typing-bubble{background:var(--bg3);border:1px solid var(--bdr);border-radius:16px;border-bottom-left-radius:5px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.td{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:tb 1.2s infinite}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── Input area ── */
.input-area{padding:12px 18px 16px;border-top:1px solid var(--bdr);background:rgba(14,20,40,.85);backdrop-filter:blur(20px);display:flex;align-items:flex-end;gap:8px;flex-shrink:0;z-index:2;position:relative}
.inp-extra{width:36px;height:36px;border:none;background:var(--bg3);border-radius:10px;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .2s;border:1px solid var(--bdr);flex-shrink:0}
.inp-extra:hover{color:var(--ac);border-color:var(--ac)}
.inp-extra.recording{color:var(--red);border-color:var(--red);animation:recPulse 1s infinite}
@keyframes recPulse{50%{box-shadow:0 0 0 4px rgba(255,79,106,.2)}}
.msg-wrap-inp{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;display:flex;align-items:flex-end;gap:6px;padding:7px 12px;transition:border-color .2s,box-shadow .2s;min-height:44px}
.msg-wrap-inp:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}
.msg-inp{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:'Sora',sans-serif;font-size:13.5px;line-height:1.5;resize:none;max-height:110px;overflow-y:auto;align-self:center}
.msg-inp::placeholder{color:var(--t3)}
.emoji-btn{background:none;border:none;cursor:pointer;font-size:18px;opacity:.6;transition:opacity .2s,transform .2s;align-self:flex-end;padding:1px}
.emoji-btn:hover{opacity:1;transform:scale(1.2)}
.send-btn{width:44px;height:44px;border:none;background:var(--ac);border-radius:12px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 14px var(--glow);flex-shrink:0}
.send-btn:hover{background:var(--ac2);transform:scale(1.05)}
.send-btn:active{transform:scale(.96)}

/* ── Emoji picker ── */
.epicker{position:absolute;bottom:76px;right:18px;background:var(--bg3);border:1px solid var(--bdrh);border-radius:14px;padding:12px;display:none;flex-wrap:wrap;gap:5px;width:268px;box-shadow:var(--sh);z-index:100;animation:fadeUp .2s ease}
.epicker.open{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ep{font-size:21px;cursor:pointer;padding:3px;border-radius:7px;transition:background .15s}
.ep:hover{background:var(--bgh)}

/* ── Empty state ── */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--t3)}
.empty-icon{width:76px;height:76px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 36px var(--glow)}
.empty h2{font-size:19px;color:var(--t2);font-weight:600}
.empty p{font-size:13px;text-align:center;max-width:240px;line-height:1.6}

/* ── Call overlay ── */
.call-ov{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(8,12,24,.92);backdrop-filter:blur(20px);animation:fadeIn .3s ease}
.call-ov.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.call-card{background:var(--bg3);border:1px solid var(--bdrh);border-radius:24px;padding:36px 28px 28px;display:flex;flex-direction:column;align-items:center;gap:14px;width:290px;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:callIn .35s cubic-bezier(.4,0,.2,1);position:relative}
@keyframes callIn{from{transform:scale(.85) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.call-rings{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:90px;height:90px}
.cring{position:absolute;inset:-8px;border:2px solid var(--ac);border-radius:50%;animation:ring 1.8s ease-out infinite;opacity:0}
.cring:nth-child(2){animation-delay:.6s}.cring:nth-child(3){animation-delay:1.2s}
@keyframes ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.8);opacity:0}}
.call-av{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;border:3px solid var(--ac);box-shadow:0 0 28px var(--glow);position:relative;z-index:1;margin-top:18px}
.call-name{font-size:20px;font-weight:700}
.call-sub{font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.call-dur{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--teal);display:none}
.call-ctrls{display:flex;gap:14px;margin-top:6px}
.cc{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s}
.cc.mute{background:var(--bg2);color:var(--t2);border:1px solid var(--bdrh)}.cc.mute.on{background:var(--yellow);color:#1a1200}
.cc.spk{background:var(--bg2);color:var(--t2);border:1px solid var(--bdrh)}.cc.spk.on{background:var(--ac);color:#fff}
.cc.end{background:var(--red);color:#fff;box-shadow:0 4px 18px rgba(255,79,106,.4)}.cc.end:hover{transform:scale(1.08)}
.cc.accept{background:var(--teal);color:#fff;box-shadow:0 4px 18px rgba(0,212,170,.4)}.cc.accept:hover{transform:scale(1.08)}
.incoming-ctrls{display:flex;gap:36px;margin-top:6px}
.remote-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1;background:#000;display:none}
.local-video{position:absolute;bottom:14px;right:14px;width:110px;height:80px;border-radius:10px;object-fit:cover;border:2px solid var(--bdrh);display:none}

/* ── Auth screen ── */
.auth-screen{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
.auth-card{background:var(--bg1);border:1px solid var(--bdrh);border-radius:22px;padding:32px;width:360px;max-width:95vw;box-shadow:var(--sh)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.auth-tabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--t3);transition:all .2s}
.auth-tab.active{background:var(--ac);color:#fff}
.auth-field{margin-bottom:14px}
.auth-field label{font-size:11.5px;color:var(--t2);font-weight:500;display:block;margin-bottom:5px}
.auth-field input{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 13px;color:var(--t1);font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.auth-field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}
.auth-btn{width:100%;padding:11px;background:var(--ac);border:none;border-radius:11px;color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s;box-shadow:0 4px 18px var(--glow)}
.auth-btn:hover{background:var(--ac2);transform:translateY(-1px)}
.auth-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center}

/* ── Toast ── */
.toast{position:fixed;top:18px;right:18px;z-index:9999;background:var(--bg3);border:1px solid var(--bdrh);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:300px}
.toast.show{transform:translateX(0)}

/* ── Profile panel ── */
.prof-ov{position:fixed;inset:0;z-index:500;display:none}
.prof-ov.active{display:block}
.prof-panel{position:absolute;left:18px;top:60px;background:var(--bg3);border:1px solid var(--bdrh);border-radius:16px;padding:18px;width:240px;box-shadow:var(--sh);animation:fadeUp .2s ease}
.prof-hd{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.prof-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.prof-nm{font-size:15px;font-weight:700}
.prof-tag{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.prof-div{height:1px;background:var(--bdr);margin:10px 0}
.prof-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s}
.prof-item:hover{background:var(--bgh);color:var(--t1)}
.prof-item.danger:hover{background:rgba(255,79,106,.1);color:var(--red)}

/* ── Responsive ── */
@media(max-width:680px){
  :root{--sw:100vw}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:20}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .s-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:19}
  .s-overlay.active{display:block}
  .msgs-area{padding:12px 10px}
  .input-area{padding:9px 10px 12px}
  .chat-header{padding:9px 12px}
  .epicker{right:8px;bottom:72px;width:250px}
  .call-card{width:88vw}
}
@media(min-width:681px) and (max-width:1024px){:root{--sw:250px}}

/* Gradient classes */
.g1{background:linear-gradient(135deg,#6c63ff,#a855f7)}
.g2{background:linear-gradient(135deg,#00d4aa,#0ea5e9)}
.g3{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.g4{background:linear-gradient(135deg,#ec4899,#8b5cf6)}
.g5{background:linear-gradient(135deg,#10b981,#3b82f6)}
.g6{background:linear-gradient(135deg,#f97316,#eab308)}
.gme{background:linear-gradient(135deg,#6c63ff,#00d4aa)}
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="width:42px;height:42px;font-size:22px">💬</div>
      <span class="logo-txt" style="font-size:22px">Nova Chat</span>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Войти</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Регистрация</div>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="auth-field"><label>Логин или Email</label><input id="lLogin" type="text" placeholder="username или email"></div>
      <div class="auth-field"><label>Пароль</label><input id="lPass" type="password" placeholder="••••••••"></div>
      <button class="auth-btn" onclick="doLogin()">Войти</button>
      <div class="auth-err" id="loginErr"></div>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="auth-field"><label>Имя пользователя</label><input id="rUser" type="text" placeholder="ivan_petrov"></div>
      <div class="auth-field"><label>Email</label><input id="rEmail" type="email" placeholder="ivan@example.com"></div>
      <div class="auth-field"><label>Отображаемое имя</label><input id="rName" type="text" placeholder="Иван Петров"></div>
      <div class="auth-field"><label>Пароль (мин. 6 символов)</label><input id="rPass" type="password" placeholder="••••••••"></div>
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
      <div class="auth-err" id="regErr"></div>
    </div>
  </div>
</div>

<!-- ── App Shell ── -->
<div class="app" id="appShell" style="display:none">

  <div class="s-overlay" id="sOv" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="s-head">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <span class="logo-txt">Nova Chat</span>
      </div>
      <div class="av-btn" id="myAvBtn" onclick="toggleProfile()">
        <span id="myAvEmoji">😊</span>
        <div class="online-dot"></div>
      </div>
    </div>
    <div class="s-search">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Поиск..." id="searchInp" oninput="filterChats(this.value)">
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab(this,'all')">Все</div>
      <div class="nav-tab" onclick="switchTab(this,'personal')">Личные</div>
      <div class="nav-tab" onclick="switchTab(this,'group')">Группы</div>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty" id="emptyState">
      <div class="empty-icon">💬</div>
      <h2>Nova Chat</h2>
      <p>Выберите чат для начала общения.<br>Защищено E2E-шифрованием.</p>
    </div>

    <div id="chatView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <!-- Header -->
      <div class="chat-header">
        <button class="menu-btn" id="menuBtn" onclick="openSidebar()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="h-av" id="hAv"></div>
        <div class="h-info">
          <div class="h-name" id="hName"></div>
          <div class="h-status" id="hStatus"></div>
        </div>
        <div class="h-actions">
          <button class="act-btn green" title="Голосовой звонок" onclick="startVoiceCall()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012.18 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </button>
          <button class="act-btn green" title="Видеозвонок" onclick="startVideoCall()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          </button>
          <button class="act-btn" title="Участники чата" onclick="showMembers()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages area -->
      <div class="msgs-area" id="msgsArea"></div>

      <!-- Typing indicator -->
      <div class="typing-ind" id="typingInd">
        <div class="msg-sm-av g2" id="typingAv"></div>
        <div class="typing-bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>
        <span style="font-size:11px;color:var(--t3);margin-left:2px" id="typingName"></span>
      </div>

      <!-- Emoji picker -->
      <div class="epicker" id="epicker"></div>

      <!-- Input area -->
      <div class="input-area">
        <!-- Attach file -->
        <label class="inp-extra" title="Прикрепить файл">
          <input type="file" id="fileInput" style="display:none" onchange="handleFileAttach(this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21.44 11.05L12.25 20.24a6 6 0 01-8.49-8.49l8.57-8.57A4 4 0 0118 8.83l-8.59 8.57a2 2 0 01-2.83-2.83l7.49-7.48"/></svg>
        </label>
        <!-- Voice record -->
        <button class="inp-extra" id="voiceBtn" title="Голосовое сообщение" onclick="toggleVoiceRecord()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <div class="msg-wrap-inp">
          <textarea class="msg-inp" id="msgInp" rows="1" placeholder="Написать сообщение..." onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>
          <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
        </div>
        <button class="send-btn" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Profile panel -->
  <div class="prof-ov" id="profOv" onclick="closeProfCheck(event)">
    <div class="prof-panel">
      <div class="prof-hd">
        <div class="prof-av gme" id="profBigAv">😊</div>
        <div>
          <div class="prof-nm" id="profNm">—</div>
          <div class="prof-tag" id="profTag">@—</div>
        </div>
      </div>
      <div class="prof-div"></div>
      <div class="prof-item" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Новый чат
      </div>
      <div class="prof-item" onclick="showToast('🔔','Уведомления','Настройки уведомлений')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        Уведомления
      </div>
      <div class="prof-div"></div>
      <div class="prof-item danger" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Выйти
      </div>
    </div>
  </div>

  <!-- Remote / local video elements (for video calls) -->
  <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
  <video id="localVideo" class="local-video" autoplay muted playsinline></video>

  <!-- Call overlay -->
  <div class="call-ov" id="callOv">
    <div class="call-card">
      <div class="call-rings" id="callRings"><div class="cring"></div><div class="cring"></div><div class="cring"></div></div>
      <div class="call-av" id="callAv"></div>
      <div class="call-name" id="callName"></div>
      <div class="call-sub" id="callSub">Вызов...</div>
      <div class="call-dur" id="callDur">00:00</div>
      <div class="call-ctrls" id="callCtrls">
        <button class="cc mute" id="muteBtn" onclick="toggleMuteUI()">🎙️</button>
        <button class="cc end" onclick="endCallUI()">📵</button>
        <button class="cc spk" id="spkBtn" onclick="toggleSpkUI()">🔊</button>
      </div>
      <div class="incoming-ctrls" id="inCtrls" style="display:none">
        <button class="cc end" onclick="rejectCallUI()">📵</button>
        <button class="cc accept" onclick="acceptCallUI()">📞</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastIco"></span>
  <div><div style="font-size:13px;font-weight:600" id="toastT"></div><div style="font-size:11.5px;color:var(--t2)" id="toastB"></div></div>
</div>

<script src="/static/js/nova-client.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════
let allChats    = [];
let currentChat = null;
let currentTab  = 'all';
let isRecording = false;
let pendingCall = null;   // { callId, offerSdp, callType, caller }
let callTimer   = null;
let callSec     = 0;
let isMuted     = false;
let isSpeaker   = true;

const EMOJIS = ['😊','😂','❤️','👍','🔥','✨','🎉','😎','🤔','😅','💯','🙌','👋','😍','😜','💪','🤝','🚀','💡','⚡','🎯','✅','🔐','📱','💻','🌟','🎵','🍕','🌍'];
const GRAD   = ['g1','g2','g3','g4','g5','g6'];
const EMOJIS_MAP = ['👤','👩‍💼','👨‍💻','👩‍🎨','🎮','🌍','🚀','🎯','💡'];

// ══════════════════════════════════════════════════════════════
//  Boot
// ══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildEmojiPicker();

  if (Nova.isLoggedIn()) {
    showApp();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }

  // Nova events
  Nova.on('message',      onNewMessage);
  Nova.on('typing',       onTyping);
  Nova.on('stop_typing',  onStopTyping);
  Nova.on('read',         onRead);
  Nova.on('user_online',  d => showToast('🟢', d.name, 'в сети'));
  Nova.on('user_offline', d => {});
  Nova.on('incoming_call', onIncomingCall);
  Nova.on('call_accepted', onCallAccepted);
  Nova.on('call_rejected', d => { showToast('📵','Звонок отклонён',''); endCallUI(true); });
  Nova.on('call_ended',    d => endCallUI(true));
  Nova.on('remote_stream', s => {
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = s; rv.style.display = 'block';
  });
  Nova.on('local_stream', s => {
    const lv = document.getElementById('localVideo');
    lv.srcObject = s; lv.style.display = 'block';
  });
  Nova.on('call_cleanup', () => {
    document.getElementById('remoteVideo').style.display = 'none';
    document.getElementById('localVideo').style.display = 'none';
  });
});

// ══════════════════════════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((el,i) =>
    el.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
  document.getElementById('loginForm').style.display    = tab==='login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
}

async function doLogin() {
  const username = document.getElementById('lLogin').value.trim();
  const password = document.getElementById('lPass').value;
  try {
    await Nova.login({ username, password });
    showApp();
  } catch(e) { document.getElementById('loginErr').textContent = e.message; }
}

async function doRegister() {
  const username     = document.getElementById('rUser').value.trim();
  const email        = document.getElementById('rEmail').value.trim();
  const display_name = document.getElementById('rName').value.trim();
  const password     = document.getElementById('rPass').value;
  try {
    await Nova.register({ username, email, display_name, password });
    showApp();
  } catch(e) { document.getElementById('regErr').textContent = e.message; }
}

async function doLogout() {
  await Nova.logout();
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  allChats = []; currentChat = null;
  closeProfile();
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  const me = Nova.getMe();
  if (me) {
    document.getElementById('profNm').textContent  = me.display_name;
    document.getElementById('profTag').textContent = '@' + me.username;
  }
  loadChats();
}

// ══════════════════════════════════════════════════════════════
//  Chats
// ══════════════════════════════════════════════════════════════
async function loadChats() {
  try {
    allChats = await Nova.chats.list();
    // Load last messages for each chat and compute display info
    renderChatList(allChats);
  } catch(e) {
    showToast('❌','Ошибка','Не удалось загрузить чаты');
  }
}

function renderChatList(list) {
  const el = document.getElementById('chatList');
  el.innerHTML = '';
  const filtered = currentTab === 'all' ? list : list.filter(c => c.type === currentTab);
  filtered.forEach((c, i) => {
    const grad = GRAD[i % GRAD.length];
    const emoji = EMOJIS_MAP[i % EMOJIS_MAP.length];
    const div = document.createElement('div');
    div.className = 'chat-item' + (currentChat?.id === c.id ? ' active' : '');
    div.id = 'ci-' + c.id;
    div.onclick = () => openChat(c);
    div.innerHTML = `
      <div class="ci-av">
        <div class="ci-img ${grad}">${c.avatar_url ? `<img src="${c.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : emoji}</div>
        <div class="ci-dot ${c.is_online ? 'online' : 'offline'}"></div>
      </div>
      <div class="ci-info">
        <div class="ci-name">${c.name || 'Чат #' + c.id}</div>
        <div class="ci-prev">${c.type === 'group' ? '👥 Группа' : '💬 Личный'}</div>
      </div>
      <div class="ci-meta">
        <div class="ci-time">${formatTime(c.created_at)}</div>
      </div>`;
    el.appendChild(div);
  });
}

async function openChat(chat) {
  currentChat = chat;
  Nova.connectChat(chat.id);

  document.querySelectorAll('.chat-item').forEach(e => e.classList.remove('active'));
  document.getElementById('ci-' + chat.id)?.classList.add('active');

  document.getElementById('emptyState').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';

  // Header
  const idx = allChats.findIndex(c => c.id === chat.id);
  const grad = GRAD[Math.max(0,idx) % GRAD.length];
  const hAv = document.getElementById('hAv');
  hAv.className = 'h-av ' + grad;
  hAv.textContent = EMOJIS_MAP[Math.max(0,idx) % EMOJIS_MAP.length];
  document.getElementById('hName').textContent   = chat.name || 'Чат #' + chat.id;
  const hs = document.getElementById('hStatus');
  hs.textContent  = chat.is_online ? 'в сети' : chat.type === 'group' ? 'групповой чат' : 'не в сети';
  hs.className    = 'h-status' + (chat.is_online ? '' : ' off');

  closeSidebar();
  await loadHistory();
}

async function loadHistory() {
  if (!currentChat) return;
  const msgs = await Nova.messages.history(currentChat.id);
  const area = document.getElementById('msgsArea');
  area.innerHTML = '';
  const sep = document.createElement('div');
  sep.className = 'msg-date-sep'; sep.textContent = 'Сегодня';
  area.appendChild(sep);
  msgs.forEach(m => appendMsg(m, false));
  scrollBottom();
}

function filterChats(q) {
  const filtered = allChats.filter(c =>
    (c.name || '').toLowerCase().includes(q.toLowerCase())
  );
  renderChatList(filtered);
}

function switchTab(el, tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterChats(document.getElementById('searchInp').value);
}

// ══════════════════════════════════════════════════════════════
//  Messages
// ══════════════════════════════════════════════════════════════
function appendMsg(m, animate = true) {
  const area = document.getElementById('msgsArea');
  const me = Nova.getMe();
  const isOut = m.sender_id === me?.id;
  const idx = allChats.findIndex(c => c.id === currentChat?.id);
  const grad = GRAD[Math.max(0,idx) % GRAD.length];

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isOut ? 'out' : 'in');
  if (!animate) wrap.style.animation = 'none';

  let mediaHtml = '';
  if (m.msg_type === 'image' || m.type === 'image') {
    mediaHtml = `<img class="msg-img" src="${m.media_url}" alt="фото" onclick="window.open('${m.media_url}','_blank')">`;
  } else if (m.msg_type === 'video' || m.type === 'video') {
    mediaHtml = `<video class="msg-video" src="${m.media_url}" controls></video>`;
  } else if (m.msg_type === 'voice' || m.type === 'voice') {
    mediaHtml = `<div class="msg-voice" onclick="playVoice('${m.media_url}')"><span class="voice-icon">🎙️</span><span class="voice-dur">${m.meta?.duration ? formatDur(m.meta.duration) : '0:00'}</span><span style="font-size:11px;color:var(--t2)">Голосовое</span></div>`;
  } else if (m.msg_type === 'file' || m.type === 'file') {
    mediaHtml = `<a class="msg-file" href="${m.media_url}" target="_blank" download><span class="file-icon">📎</span><span class="file-name">${m.meta?.filename || 'Файл'}</span></a>`;
  }

  const time = m.created_at ? formatTime(m.created_at) : '--:--';
  wrap.innerHTML = `
    ${!isOut ? `<div class="msg-sm-av ${grad}">${EMOJIS_MAP[(m.sender_id||0) % EMOJIS_MAP.length]}</div>` : ''}
    <div>
      ${!isOut && currentChat?.type === 'group' ? `<div style="font-size:10.5px;color:var(--t2);margin-bottom:2px;padding-left:2px">${m.sender_name||''}</div>` : ''}
      <div class="msg-bubble ${isOut?'out':'in'}">
        ${mediaHtml}
        ${m.text ? `<span>${m.text}</span>` : ''}
        <div class="msg-meta"><span>${time}</span>${isOut?'<span class="chk">✓✓</span>':''}</div>
      </div>
    </div>`;
  area.appendChild(wrap);
}

// ── WebSocket events ──────────────────────────────────────────
function onNewMessage(msg) {
  if (msg.chat_id !== currentChat?.id) {
    // Flash badge on sidebar item
    showToast('💬', msg.sender_name, msg.text?.slice(0,60) || '📎 Медиа');
    return;
  }
  appendMsg(msg, true);
  scrollBottom();
  Nova.sendRead(msg.chat_id, msg.id);
}

let typingTimeouts = {};
function onTyping({ chatId, userId, name }) {
  if (chatId !== currentChat?.id) return;
  document.getElementById('typingName').textContent = name + ' печатает...';
  document.getElementById('typingInd').classList.add('vis');
  scrollBottom();
  clearTimeout(typingTimeouts[userId]);
  typingTimeouts[userId] = setTimeout(() => onStopTyping({ userId }), 4000);
}
function onStopTyping({ userId }) {
  clearTimeout(typingTimeouts[userId]);
  document.getElementById('typingInd').classList.remove('vis');
}
function onRead({ messageId }) { /* update checkmarks */ }

// ── Sending ───────────────────────────────────────────────────
function sendMsg() {
  if (!currentChat) return;
  const inp = document.getElementById('msgInp');
  const text = inp.value.trim();
  if (!text) return;
  Nova.sendText(currentChat.id, text);
  inp.value = ''; autoResize(inp);
}

async function handleFileAttach(input) {
  if (!input.files.length || !currentChat) return;
  const file = input.files[0];
  showToast('⏳','Загрузка файла', file.name.slice(0,30));
  try {
    const uploaded = await Nova.media.upload(file);
    Nova.sendMedia(currentChat.id, uploaded.id, '');
    showToast('✅','Файл отправлен', file.name.slice(0,30));
  } catch(e) {
    showToast('❌','Ошибка загрузки', e.message);
  }
  input.value = '';
}

async function toggleVoiceRecord() {
  const btn = document.getElementById('voiceBtn');
  if (!isRecording) {
    try {
      await Nova.startVoiceRecording();
      isRecording = true;
      btn.classList.add('recording');
      showToast('🎙️','Запись','Нажмите ещё раз чтобы остановить');
    } catch(e) { showToast('❌','Нет доступа к микрофону', e.message); }
  } else {
    isRecording = false;
    btn.classList.remove('recording');
    try {
      const uploaded = await Nova.stopVoiceRecording();
      if (currentChat) Nova.sendMedia(currentChat.id, uploaded.id, '');
    } catch(e) { showToast('❌','Ошибка', e.message); }
  }
}

function handleTyping() {
  if (currentChat) Nova.sendTyping(currentChat.id);
  autoResize(document.getElementById('msgInp'));
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

// ══════════════════════════════════════════════════════════════
//  Calls
// ══════════════════════════════════════════════════════════════
async function startVoiceCall() {
  if (!currentChat) return;
  showCallOverlay(currentChat.name || 'Чат #' + currentChat.id, GRAD[0], EMOJIS_MAP[0], false);
  try {
    await Nova.startCall(currentChat.id, 'voice');
    connectCallTimer();
  } catch(e) { showToast('❌','Ошибка звонка', e.message); hideCallOverlay(); }
}

async function startVideoCall() {
  if (!currentChat) return;
  showCallOverlay(currentChat.name || 'Чат #' + currentChat.id, GRAD[0], EMOJIS_MAP[0], false);
  try {
    await Nova.startCall(currentChat.id, 'video');
    connectCallTimer();
  } catch(e) { showToast('❌','Ошибка', e.message); hideCallOverlay(); }
}

function onIncomingCall(data) {
  pendingCall = data;
  showCallOverlay(data.caller.display_name, GRAD[1], '📲', true);
}

async function acceptCallUI() {
  if (!pendingCall) return;
  document.getElementById('inCtrls').style.display = 'none';
  document.getElementById('callCtrls').style.display = 'flex';
  try {
    await Nova.acceptCall(pendingCall.callId, pendingCall.offerSdp, pendingCall.callType);
    connectCallTimer();
  } catch(e) { showToast('❌','Ошибка', e.message); hideCallOverlay(); }
}

async function rejectCallUI() {
  if (pendingCall) { await Nova.rejectCall(pendingCall.callId); pendingCall = null; }
  hideCallOverlay();
}

async function endCallUI(silent = false) {
  if (!silent) await Nova.endCall();
  clearInterval(callTimer); callTimer = null; callSec = 0;
  hideCallOverlay();
  pendingCall = null;
}

function showCallOverlay(name, grad, emoji, incoming) {
  document.getElementById('callAv').className = 'call-av ' + grad;
  document.getElementById('callAv').textContent = emoji;
  document.getElementById('callName').textContent = name;
  document.getElementById('callSub').textContent = incoming ? '📲 Входящий звонок' : 'Вызов...';
  document.getElementById('callSub').style.display = 'block';
  document.getElementById('callDur').style.display = 'none';
  document.getElementById('callRings').style.display = incoming ? 'none' : 'block';
  document.getElementById('callCtrls').style.display = incoming ? 'none' : 'flex';
  document.getElementById('inCtrls').style.display = incoming ? 'flex' : 'none';
  document.getElementById('callOv').classList.add('active');
}
function hideCallOverlay() { document.getElementById('callOv').classList.remove('active'); }

function connectCallTimer() {
  document.getElementById('callSub').style.display = 'none';
  document.getElementById('callDur').style.display = 'block';
  document.getElementById('callRings').style.display = 'none';
  callSec = 0;
  clearInterval(callTimer);
  callTimer = setInterval(() => {
    callSec++;
    const m = String(Math.floor(callSec/60)).padStart(2,'0');
    const s = String(callSec%60).padStart(2,'0');
    document.getElementById('callDur').textContent = m+':'+s;
  }, 1000);
}

function onCallAccepted(data) { connectCallTimer(); }

function toggleMuteUI() {
  isMuted = !isMuted;
  Nova.toggleMute(isMuted);
  const btn = document.getElementById('muteBtn');
  btn.classList.toggle('on', isMuted);
  btn.textContent = isMuted ? '🔇' : '🎙️';
}
function toggleSpkUI() {
  isSpeaker = !isSpeaker;
  document.getElementById('spkBtn').classList.toggle('on', isSpeaker);
}

// ══════════════════════════════════════════════════════════════
//  New chat dialog
// ══════════════════════════════════════════════════════════════
async function newChat() {
  closeProfile();
  const q = prompt('Введите имя пользователя для нового чата:');
  if (!q) return;
  try {
    const results = await Nova.users.search(q);
    if (!results.length) { showToast('🔍','Не найдено', 'Пользователь не найден'); return; }
    const target = results[0];
    const res = await Nova.chats.createPersonal(target.id);
    showToast('✅','Чат создан', 'с ' + target.display_name);
    await loadChats();
    // Open the new chat
    const chat = allChats.find(c => c.id === res.chat_id);
    if (chat) openChat(chat);
  } catch(e) { showToast('❌','Ошибка', e.message); }
}

async function showMembers() {
  if (!currentChat) return;
  try {
    const members = await Nova.chats.members(currentChat.id);
    const names = members.map(m => `${m.display_name}${m.is_admin?' 👑':''}${m.is_online?' 🟢':''}`).join('\n');
    alert('Участники чата:\n\n' + names);
  } catch(e) { showToast('❌','Ошибка', e.message); }
}

// ══════════════════════════════════════════════════════════════
//  UI Helpers
// ══════════════════════════════════════════════════════════════
function playVoice(url) {
  const a = new Audio(url);
  a.play().catch(() => showToast('🔈','Ошибка','Не удалось воспроизвести'));
}

function scrollBottom() {
  const a = document.getElementById('msgsArea');
  setTimeout(() => a.scrollTop = a.scrollHeight, 40);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatDur(sec) {
  const m = Math.floor(sec/60); const s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sOv').classList.add('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sOv').classList.remove('active');
}

function toggleProfile() { document.getElementById('profOv').classList.toggle('active'); }
function closeProfile()  { document.getElementById('profOv').classList.remove('active'); }
function closeProfCheck(e) { if (e.target === document.getElementById('profOv')) closeProfile(); }

function buildEmojiPicker() {
  const el = document.getElementById('epicker');
  EMOJIS.forEach(e => {
    const s = document.createElement('span');
    s.className = 'ep'; s.textContent = e;
    s.onclick = () => {
      document.getElementById('msgInp').value += e;
      toggleEmoji();
    };
    el.appendChild(s);
  });
}
function toggleEmoji() { document.getElementById('epicker').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#epicker') && !e.target.closest('.emoji-btn'))
    document.getElementById('epicker').classList.remove('open');
});

let toastT;
function showToast(ico, title, body) {
  const t = document.getElementById('toast');
  document.getElementById('toastIco').textContent = ico;
  document.getElementById('toastT').textContent   = title;
  document.getElementById('toastB').textContent   = body;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
